<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="An interactive 3D constellation visualization built with Three.js. Explore space in your browser." />
    <meta property="og:title" content="constellations" />
    <meta property="og:type" content="website" />
    <meta property="og:description" content="An interactive 3D constellation visualization built with Three.js." />
    <meta property="og:image" content="./src/images/constellations.png" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@400;500;600;700&family=Cormorant+Garamond:wght@300;400;500&display=swap" rel="stylesheet" />
    <title>constellations</title>
  </head>
  <body>
    <div id="scene-container"></div>

    <div class="hud">
      <div class="scanline"></div>
      <div class="grid-overlay"></div>

      <nav class="hud__nav">
        <div class="hud__nav-left">
          <span class="hud__marker">&#9671;</span>
          <span class="hud__title">constellations</span>
        </div>
        <div class="hud__nav-right">
          <span class="hud__status">
            <span class="hud__status-dot"></span>
            LIVE
          </span>
          <button class="hud__show-info" id="hud-show" aria-label="Show info" style="display:none">?</button>
        </div>
      </nav>

      <main class="hud__center" id="hud-center">
        <button class="hud__dismiss" id="hud-dismiss" aria-label="Dismiss overlay">✕</button>
        <div class="hud__hero">
          <p class="hud__label">THREE.JS VISUALIZATION</p>
          <h1 class="hud__headline">Navigate the<br />cosmic void</h1>
          <div class="hud__divider"></div>
          <p class="hud__controls">
            <span class="hud__key">drag</span> to orbit
            <span class="hud__separator">/</span>
            <span class="hud__key">scroll</span> to zoom
          </p>
        </div>

        <div class="hud__crosshair">
          <span class="ch ch--top"></span>
          <span class="ch ch--right"></span>
          <span class="ch ch--bottom"></span>
          <span class="ch ch--left"></span>
        </div>
      </main>

      <footer class="hud__footer">
        <div class="hud__footer-left">
          <span class="hud__coord" id="coord-display">0.00 / 0.00 / 1.00</span>
          <label class="hud__speed"><span class="hud__speed-label">SPD</span><input type="range" id="speed-slider" min="1" max="100" value="20" class="hud__speed-slider" /></label>
        </div>
        <div class="hud__footer-center">
          <span class="hud__credit">built by <a href="https://alextong.me/" target="_blank" rel="noopener">alex tong</a></span>
        </div>
        <div class="hud__footer-right">
          <a href="https://github.com/alextongme/constellations" target="_blank" rel="noopener" class="hud__social" aria-label="GitHub">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M9 19c-5 1.5-5-2.5-7-3m14 6v-3.87a3.37 3.37 0 0 0-.94-2.61c3.14-.35 6.44-1.54 6.44-7A5.44 5.44 0 0 0 20 4.77 5.07 5.07 0 0 0 19.91 1S18.73.65 16 2.48a13.38 13.38 0 0 0-7 0C6.27.65 5.09 1 5.09 1A5.07 5.07 0 0 0 5 4.77a5.44 5.44 0 0 0-1.5 3.78c0 5.42 3.3 6.61 6.44 7A3.37 3.37 0 0 0 9 18.13V22"/></svg>
          </a>
          <a href="https://linkedin.com/in/alextongme" target="_blank" rel="noopener" class="hud__social" aria-label="LinkedIn">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M16 8a6 6 0 0 1 6 6v7h-4v-7a2 2 0 0 0-2-2 2 2 0 0 0-2 2v7h-4v-7a6 6 0 0 1 6-6z"/><rect x="2" y="9" width="4" height="12"/><circle cx="4" cy="4" r="2"/></svg>
          </a>
        </div>
      </footer>
    </div>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
